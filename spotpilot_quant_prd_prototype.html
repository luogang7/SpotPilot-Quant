<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SpotPilot Quant 现货量化领航台 PRD 交互原型</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f7fb;
      --panel: #ffffff;
      --panel-2: #f7fafc;
      --panel-3: #eef4f8;
      --line: #d9e3ec;
      --line-strong: #bccbd8;
      --text: #17212b;
      --muted: #667789;
      --faint: #8a99a8;
      --green: #0f9f6e;
      --green-soft: rgba(15, 159, 110, 0.12);
      --red: #d94854;
      --red-soft: rgba(217, 72, 84, 0.12);
      --yellow: #b7791f;
      --yellow-soft: rgba(183, 121, 31, 0.13);
      --blue: #2563eb;
      --blue-soft: rgba(37, 99, 235, 0.12);
      --cyan: #0f8f9f;
      --cyan-soft: rgba(15, 143, 159, 0.12);
      --shadow: 0 10px 28px rgba(29, 51, 74, 0.08);
      --radius: 8px;
      --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      letter-spacing: 0;
      min-width: 1080px;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app-shell {
      display: grid;
      grid-template-columns: 232px minmax(720px, 1fr) 330px;
      min-height: 100vh;
    }

    .sidebar {
      background: #ffffff;
      border-right: 1px solid var(--line);
      padding: 18px 14px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      padding: 8px 10px 16px;
      border-bottom: 1px solid var(--line);
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      border: 1px solid rgba(15, 143, 159, 0.24);
      background:
        linear-gradient(135deg, rgba(15, 159, 110, 0.14), rgba(37, 99, 235, 0.1)),
        #eef7f8;
      border-radius: 8px;
      display: grid;
      place-items: center;
      font-weight: 800;
      color: var(--cyan);
    }

    .brand-title {
      font-size: 14px;
      font-weight: 760;
      line-height: 1.3;
    }

    .brand-sub {
      color: var(--muted);
      font-size: 11px;
      margin-top: 2px;
    }

    .nav-group-label {
      color: var(--faint);
      font-size: 11px;
      text-transform: uppercase;
      margin: 18px 10px 8px;
    }

    .nav-button {
      width: 100%;
      min-height: 42px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--muted);
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 10px;
      margin: 3px 0;
      text-align: left;
    }

    .nav-button:hover {
      background: #f2f7fb;
      color: var(--text);
    }

    .nav-button.active {
      background: #eaf7f9;
      color: var(--text);
      border-color: #b7dce2;
    }

    .nav-icon,
    .icon-button {
      width: 26px;
      height: 26px;
      display: inline-grid;
      place-items: center;
      border-radius: 7px;
      border: 1px solid var(--line);
      color: var(--cyan);
      background: #f7fafc;
      flex: 0 0 auto;
    }

    .nav-meta {
      flex: 1;
      min-width: 0;
    }

    .nav-name {
      font-size: 13px;
      font-weight: 650;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .nav-desc {
      color: var(--faint);
      font-size: 11px;
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .side-foot {
      margin-top: 18px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f7fafc;
    }

    .side-foot strong {
      display: block;
      font-size: 12px;
      margin-bottom: 6px;
    }

    .side-foot p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
    }

    .main {
      min-width: 0;
      border-right: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(222, 235, 246, 0.58), rgba(244, 247, 251, 0) 220px),
        var(--bg);
    }

    .topbar {
      min-height: 68px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 0 22px;
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(12px);
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .chip,
    .mode-pill,
    .mini-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line);
      background: #f7fafc;
      color: var(--muted);
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 12px;
      line-height: 1;
      min-height: 30px;
      white-space: nowrap;
    }

    .mini-chip {
      padding: 5px 8px;
      min-height: 24px;
      font-size: 11px;
    }

    .chip.good,
    .mini-chip.good {
      color: var(--green);
      background: var(--green-soft);
      border-color: rgba(15, 159, 110, 0.28);
    }

    .chip.warn,
    .mini-chip.warn {
      color: var(--yellow);
      background: var(--yellow-soft);
      border-color: rgba(183, 121, 31, 0.28);
    }

    .chip.bad,
    .mini-chip.bad {
      color: var(--red);
      background: var(--red-soft);
      border-color: rgba(217, 72, 84, 0.28);
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: currentColor;
      box-shadow: none;
    }

    .segmented {
      display: inline-grid;
      grid-template-columns: 1fr 1fr;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #fbfdff;
      height: 36px;
    }

    .segmented button {
      border: 0;
      background: transparent;
      color: var(--muted);
      padding: 0 12px;
      font-size: 12px;
      min-width: 74px;
    }

    .segmented button.active {
      color: #ffffff;
      background: var(--cyan);
      font-weight: 760;
    }

    .segmented.live button.active {
      background: var(--red);
      color: #ffffff;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn {
      border: 1px solid var(--line-strong);
      background: #f7fafc;
      color: var(--text);
      border-radius: 8px;
      padding: 0 12px;
      min-height: 36px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 650;
      white-space: nowrap;
    }

    .btn:hover {
      border-color: #9fb5c5;
      background: #eef4f8;
    }

    .btn.primary {
      background: var(--cyan);
      color: #ffffff;
      border-color: var(--cyan);
    }

    .btn.warn {
      background: var(--yellow-soft);
      color: var(--yellow);
      border-color: rgba(183, 121, 31, 0.3);
    }

    .btn.danger {
      background: var(--red-soft);
      color: var(--red);
      border-color: rgba(217, 72, 84, 0.3);
    }

    .btn.ghost {
      background: transparent;
    }

    .content {
      padding: 22px;
    }

    .page {
      display: none;
    }

    .page.active {
      display: block;
    }

    .page-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 18px;
    }

    .eyebrow {
      color: var(--cyan);
      font-size: 12px;
      font-weight: 760;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    h1 {
      margin: 0;
      font-size: 26px;
      line-height: 1.18;
      letter-spacing: 0;
    }

    .page-sub {
      color: var(--muted);
      margin-top: 7px;
      font-size: 13px;
      line-height: 1.55;
      max-width: 760px;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .grid {
      display: grid;
      gap: 12px;
    }

    .cols-2 {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .cols-3 {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .cols-4 {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .cols-6 {
      grid-template-columns: repeat(6, minmax(0, 1fr));
    }

    .cols-auto {
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    }

    .panel {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 8px;
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.02) inset;
      overflow: hidden;
    }

    .panel.pad {
      padding: 14px;
    }

    .panel-head {
      min-height: 48px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 14px;
    }

    .panel-title {
      font-size: 13px;
      font-weight: 760;
    }

    .panel-note {
      color: var(--faint);
      font-size: 11px;
    }

    .panel-body {
      padding: 14px;
    }

    .metric {
      padding: 14px;
      min-height: 94px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    .metric-label {
      color: var(--muted);
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .metric-value {
      margin-top: 10px;
      font-size: 22px;
      font-weight: 820;
      line-height: 1.1;
      white-space: normal;
      overflow-wrap: normal;
      word-break: normal;
    }

    .metric-delta {
      margin-top: 8px;
      font-size: 12px;
      color: var(--muted);
      overflow-wrap: anywhere;
    }

    .positive {
      color: var(--green);
    }

    .negative {
      color: var(--red);
    }

    .warning {
      color: var(--yellow);
    }

    .cyan {
      color: var(--cyan);
    }

    .chart-box {
      min-height: 290px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .chart {
      position: relative;
      min-height: 220px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        linear-gradient(rgba(23,33,43,0.055) 1px, transparent 1px) 0 0 / 100% 44px,
        linear-gradient(90deg, rgba(23,33,43,0.055) 1px, transparent 1px) 0 0 / 72px 100%,
        #fbfdff;
      overflow: hidden;
    }

    .chart svg {
      width: 100%;
      height: 100%;
      min-height: 220px;
      display: block;
    }

    .chart-label {
      position: absolute;
      right: 12px;
      top: 12px;
      color: var(--muted);
      font-size: 11px;
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 5px 8px;
    }

    .mini-bars {
      display: grid;
      grid-template-columns: repeat(18, 1fr);
      gap: 5px;
      align-items: end;
      height: 70px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      background: #fbfdff;
    }

    .bar {
      border-radius: 2px 2px 0 0;
      background: rgba(15, 143, 159, 0.42);
      min-height: 8px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    th,
    td {
      border-bottom: 1px solid var(--line);
      padding: 11px 12px;
      text-align: left;
      vertical-align: middle;
      white-space: nowrap;
    }

    th {
      color: var(--muted);
      font-weight: 650;
      background: #f7fafc;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .table-wrap {
      overflow: auto;
    }

    .select,
    .input,
    .textarea {
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: #fbfdff;
      color: var(--text);
      min-height: 36px;
      padding: 0 10px;
      outline: none;
      min-width: 120px;
    }

    .textarea {
      width: 100%;
      min-height: 104px;
      resize: vertical;
      padding: 10px;
      line-height: 1.5;
      font-family: var(--mono);
      font-size: 12px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .form-span {
      grid-column: 1 / -1;
    }

    .inline-status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f7fafc;
      padding: 9px 10px;
      color: var(--muted);
      font-size: 12px;
    }

    .result-message {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f7fafc;
      padding: 12px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
    }

    .result-message strong {
      display: block;
      color: var(--text);
      margin-bottom: 4px;
    }

    .result-message.negative {
      border-color: rgba(217, 72, 84, 0.28);
      background: var(--red-soft);
      color: var(--red);
    }

    .field {
      display: grid;
      gap: 7px;
    }

    .field label {
      color: var(--muted);
      font-size: 12px;
    }

    .range-row {
      display: grid;
      grid-template-columns: 1fr 64px;
      gap: 10px;
      align-items: center;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--cyan);
    }

    .toggle {
      position: relative;
      width: 42px;
      height: 24px;
      border-radius: 999px;
      border: 1px solid var(--line-strong);
      background: #fbfdff;
      transition: 0.18s ease;
    }

    .toggle::after {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      top: 2px;
      left: 2px;
      border-radius: 999px;
      background: var(--faint);
      transition: 0.18s ease;
    }

    .toggle.on {
      background: var(--green-soft);
      border-color: rgba(15, 159, 110, 0.36);
    }

    .toggle.on::after {
      left: 18px;
      background: var(--green);
    }

    .strategy-layout,
    .split-layout {
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      gap: 12px;
    }

    .wide-layout {
      display: grid;
      grid-template-columns: 1.35fr 1fr;
      gap: 12px;
    }

    .list-card {
      border-bottom: 1px solid var(--line);
      padding: 12px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
    }

    .list-card:last-child {
      border-bottom: 0;
    }

    .list-card.active {
      background: #eaf7f9;
    }

    .list-card-title {
      font-size: 13px;
      font-weight: 760;
    }

    .list-card-sub {
      color: var(--muted);
      font-size: 11px;
      margin-top: 4px;
    }

    .timeline {
      display: grid;
      gap: 10px;
    }

    .timeline-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f7fafc;
      padding: 12px;
      display: grid;
      grid-template-columns: 88px 1fr;
      gap: 12px;
    }

    .time {
      color: var(--faint);
      font-family: var(--mono);
      font-size: 11px;
    }

    .timeline-title {
      font-size: 13px;
      font-weight: 740;
    }

    .timeline-body {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      margin-top: 4px;
    }

    .json-box {
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.65;
      white-space: pre-wrap;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfdff;
      padding: 12px;
      min-height: 246px;
    }

    .json-box.compact {
      min-height: 160px;
      max-height: 260px;
      overflow: auto;
    }

    .progress-track {
      height: 8px;
      border-radius: 999px;
      background: #fbfdff;
      border: 1px solid var(--line);
      overflow: hidden;
    }

    .progress-fill {
      width: 64%;
      height: 100%;
      background: linear-gradient(90deg, var(--cyan), var(--green));
      transition: width 0.3s ease;
    }

    .risk-state {
      border: 1px solid rgba(15, 159, 110, 0.28);
      background: var(--green-soft);
      color: var(--green);
      border-radius: 8px;
      padding: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .risk-state.warn {
      border-color: rgba(183, 121, 31, 0.3);
      background: var(--yellow-soft);
      color: var(--yellow);
    }

    .risk-state.bad {
      border-color: rgba(217, 72, 84, 0.3);
      background: var(--red-soft);
      color: var(--red);
    }

    .explain {
      background: #ffffff;
      height: 100vh;
      overflow: auto;
      position: sticky;
      top: 0;
      padding: 18px;
    }

    .explain h2 {
      font-size: 16px;
      margin: 0 0 6px;
    }

    .explain p {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
      margin: 0 0 12px;
    }

    .explain-section {
      border: 1px solid var(--line);
      background: #f7fafc;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
    }

    .explain-section strong {
      display: block;
      font-size: 12px;
      margin-bottom: 6px;
    }

    .explain-section ul {
      margin: 0;
      padding-left: 18px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.65;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(23, 33, 43, 0.32);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 80;
      padding: 18px;
    }

    .modal-backdrop.show {
      display: flex;
    }

    .modal {
      width: min(520px, 100%);
      border: 1px solid var(--line-strong);
      background: var(--panel);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .modal-head {
      padding: 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .modal-title {
      font-size: 15px;
      font-weight: 800;
    }

    .modal-body {
      padding: 14px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .modal-foot {
      border-top: 1px solid var(--line);
      padding: 12px 14px;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .toast {
      position: fixed;
      right: 22px;
      bottom: 22px;
      z-index: 100;
      display: grid;
      gap: 8px;
      width: 360px;
      max-width: calc(100vw - 44px);
    }

    .toast-item {
      border: 1px solid var(--line-strong);
      background: #ffffff;
      border-radius: 8px;
      padding: 12px;
      box-shadow: var(--shadow);
      font-size: 12px;
      color: var(--muted);
    }

    .toast-item strong {
      color: var(--text);
      display: block;
      margin-bottom: 4px;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 1240px) {
      body {
        min-width: 980px;
      }

      .app-shell {
        grid-template-columns: 210px minmax(680px, 1fr);
      }

      .explain {
        display: none;
      }

      .cols-6 {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" aria-label="主导航">
      <div class="brand">
        <div class="brand-mark">Q</div>
        <div>
          <div class="brand-title">SpotPilot Quant</div>
          <div class="brand-sub">本地验证版 PRD 原型</div>
        </div>
      </div>

      <div class="nav-group-label">产品页面</div>
      <nav id="nav"></nav>

      <div class="side-foot">
        <strong>设计原则</strong>
        <p>第一屏回答系统状态、策略原因、AI 判断和风控结果。真实交易动作必须可确认、可追溯、可停止。</p>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">

          <thead><tr><th>时间</th><th>币种</th><th>策略</th><th>信号</th><th>原因</th>${extra ? "<th>执行结果</th>" : ""}</tr></thead>
          <tbody>
            <tr><td>00:58</td><td>BTC/USDT</td><td>MA Cross</td><td class="positive">LONG</td><td>快线上穿慢线，成交量放大</td>${extra ? "<td><span class='mini-chip good'>允许</span></td>" : ""}</tr>
            <tr><td>00:52</td><td>SOL/USDT</td><td>Breakout</td><td class="positive">LONG</td><td>突破高点，但单币仓位过高</td>${extra ? "<td><span class='mini-chip bad'>风控拦截</span></td>" : ""}</tr>
            <tr><td>00:45</td><td>ETH/USDT</td><td>RSI Mean Reversion</td><td>WAIT</td><td>RSI 未进入超卖区</td>${extra ? "<td><span class='mini-chip'>等待</span></td>" : ""}</tr>
          </tbody>
        </table>
      `;
    }

    function tradesTable() {
      return `
        <table>
          <thead><tr><th>时间</th><th>币种</th><th>方向</th><th>开仓价</th><th>平仓价</th><th>盈亏</th><th>手续费</th><th>退出原因</th></tr></thead>
          <tbody>
            <tr><td>2026-06-06</td><td>BTC/USDT</td><td>Long</td><td>66,840</td><td>68,120</td><td class="positive">+$191</td><td>$8.4</td><td>止盈</td></tr>
            <tr><td>2026-06-05</td><td>ETH/USDT</td><td>Long</td><td>3,620</td><td>3,552</td><td class="negative">-$74</td><td>$5.8</td><td>止损</td></tr>
            <tr><td>2026-06-03</td><td>SOL/USDT</td><td>Long</td><td>154.2</td><td>156.8</td><td class="positive">+$47</td><td>$2.1</td><td>AI 风险升高减仓</td></tr>
          </tbody>
        </table>
      `;
    }

    function ordersTable() {
      return `
        <table>
          <thead><tr><th>订单ID</th><th>币种</th><th>方向</th><th>价格</th><th>数量</th><th>状态</th><th>操作</th></tr></thead>
          <tbody>
            <tr><td>ORD-7781</td><td>BTC/USDT</td><td>Buy</td><td>68,100</td><td>0.08</td><td><span class="mini-chip warn">挂单</span></td><td><button class="btn ghost" data-action="cancel-order" type="button">撤单</button></td></tr>
            <tr><td>ORD-7782</td><td>ETH/USDT</td><td>Sell</td><td>3,620</td><td>0.70</td><td><span class="mini-chip warn">挂单</span></td><td><button class="btn ghost" data-action="cancel-order" type="button">撤单</button></td></tr>
          </tbody>
        </table>
      `;
    }

    function historyOrdersTable() {
      return `
        <table>
          <thead><tr><th>时间</th><th>币种</th><th>方向</th><th>类型</th><th>价格</th><th>数量</th><th>手续费</th><th>状态</th></tr></thead>
          <tbody>
            <tr><td>00:44</td><td>BTC/USDT</td><td>Buy</td><td>Limit</td><td>67,880</td><td>0.12</td><td>$8.14</td><td><span class="mini-chip good">成交</span></td></tr>
            <tr><td>23:18</td><td>ETH/USDT</td><td>Sell</td><td>Market</td><td>3,552</td><td>1.20</td><td>$4.26</td><td><span class="mini-chip good">成交</span></td></tr>
            <tr><td>22:02</td><td>SOL/USDT</td><td>Buy</td><td>Limit</td><td>154.2</td><td>10.0</td><td>$1.54</td><td><span class="mini-chip">取消</span></td></tr>
          </tbody>
        </table>
      `;
    }

    function logsTable(rows) {
      return `
        <table>
          <thead><tr><th>时间</th><th>级别</th><th>模块</th><th>币种</th><th>策略</th><th>消息</th><th>关联ID</th></tr></thead>
          <tbody>
            ${rows.map(row => `
              <tr>
                <td>${row[0]}</td><td class="${row[1] === "error" ? "negative" : row[1] === "warn" ? "warning" : ""}">${row[1]}</td>
                <td>${row[2]}</td><td>${row[3]}</td><td>${row[4]}</td><td>${row[5]}</td><td>${row[6]}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
    }

    function rangeField(label, key, value, min, max, step = 1) {
      return `
        <div class="field" style="margin-bottom:10px;">
          <label>${label}</label>
          <div class="range-row">
            <input type="range" data-param="${key}" min="${min}" max="${max}" step="${step}" value="${value}">
            <input class="input" value="${value}" readonly>
          </div>
        </div>
      `;
    }

    function riskRange(label, key, value, min, max, unit) {
      return `
        <div class="field" style="margin-bottom:12px;">
          <label>${label}</label>
          <div class="range-row">
            <input type="range" data-risk="${key}" min="${min}" max="${max}" step="${unit === "%" ? "0.5" : "1"}" value="${value}">
            <input class="input" value="${value}${unit}" readonly>
          </div>
        </div>
      `;
    }

    function calcRiskState() {
      if (state.paused) return { label: "全部暂停", desc: "策略开仓已暂停，等待人工恢复。", action: "PAUSED", className: "bad" };
      if (state.ai.risk_level === "high") return { label: "禁止开仓", desc: "AI 风险等级 high，自动阻止新仓位。", action: "NO TRADE", className: "bad" };
      return { label: "允许交易", desc: "当前亏损、回撤、仓位和数据延迟均未超过阈值。", action: "ALLOW", className: "" };
    }

    function renderAll() {
      renderNav();
      renderExplain();
      renderDashboard();
      renderMarket();
      renderStrategy();
      renderBacktest();
      renderAI();
      renderTrading();
      renderRisk();
      renderLogs();
      renderSettings();
      setActivePage();
      bindDynamicEvents();
    }

    function setActivePage() {
      document.querySelectorAll(".page").forEach(el => el.classList.toggle("active", el.dataset.page === state.page));
      document.querySelectorAll(".nav-button").forEach(btn => btn.classList.toggle("active", btn.dataset.nav === state.page));
      renderExplain();
    }

    function bindDynamicEvents() {
      document.querySelectorAll("[data-jump]").forEach(btn => {
        btn.onclick = () => switchPage(btn.dataset.jump);
      });

      const pair = document.getElementById("pairSelect");
      if (pair) pair.onchange = () => {
        state.selectedPair = pair.value;
        addLog("info", "数据", state.selectedPair, "-", "切换行情交易对并刷新指标", "DATA-" + randId());
        renderAll();
      };

      const timeframe = document.getElementById("timeframeSelect");
      if (timeframe) timeframe.onchange = () => {
        state.timeframe = timeframe.value;
        addLog("info", "数据", state.selectedPair, "-", "切换周期为 " + state.timeframe, "DATA-" + randId());
        renderAll();
      };

      const exchange = document.getElementById("exchangeSelect");
      if (exchange) exchange.onchange = () => {
        state.exchange = exchange.value;
        const pairs = Object.keys(pairData).filter(pair => pairExchanges[pair].includes(state.exchange));
        if (!pairs.includes(state.selectedPair)) state.selectedPair = pairs[0];
        addLog("info", "数据", "ALL", "-", "切换数据源为 " + state.exchange, "DATA-" + randId());
        renderAll();
      };

      document.querySelectorAll("[data-strategy]").forEach(item => {
        item.onclick = event => {
          if (event.target.matches("[data-toggle-strategy]")) return;
          state.strategy = item.dataset.strategy;
          renderAll();
        };
      });

      document.querySelectorAll("[data-toggle-strategy]").forEach(toggle => {
        toggle.onclick = event => {
          event.stopPropagation();
          const name = toggle.dataset.toggleStrategy;
          state.strategies[name].enabled = !state.strategies[name].enabled;
          addLog("info", "策略", "ALL", name, `${name} 已${state.strategies[name].enabled ? "启用" : "停用"}`, "SIG-" + randId());
          renderAll();
        };
      });

      document.querySelectorAll("[data-param]").forEach(input => {
        input.oninput = () => {
          state.strategyParams[input.dataset.param] = Number(input.value);
          input.parentElement.querySelector(".input").value = input.value;
        };
      });

      document.querySelectorAll("[data-risk]").forEach(input => {
        input.oninput = () => {
          input.parentElement.querySelector(".input").value = input.value + (input.dataset.risk === "lossStreak" ? "笔" : "%");
        };
      });

      document.querySelectorAll("[data-log-filter]").forEach(btn => {
        btn.onclick = () => renderLogs(btn.dataset.logFilter);
      });

      onClick("saveStrategy", () => {
        addLog("info", "策略", "ALL", state.strategy, "策略参数已保存到本地配置", "SIG-" + randId());
        toast("策略参数已保存", "原型中仅模拟保存，后续接 FastAPI 写入配置。");
      });

      onClick("runBacktest", runBacktest);
      onClick("syncHistory", () => {
        addLog("info", "数据", "BTC/USDT", "-", "历史 K 线同步完成：inserted=" + state.syncResult.inserted + ", updated=" + state.syncResult.updated, "DATA-" + randId());
        toast("历史数据已同步", "已写入 MySQL market_candles，可用于本地回测。");
      });
      onClick("syncHistoryFromMarket", () => {
        addLog("info", "数据", state.selectedPair, "-", "当前行情范围已同步到本地缓存", "DATA-" + randId());
        toast("行情同步完成", "当前交易对的历史 K 线已写入本地缓存。");
      });
      onClick("exportBacktestJson", () => toast("导出 JSON", "已模拟生成 backtest_ma_cross_BTC-USDT.json。"));
      onClick("exportBacktestCsv", () => toast("导出 CSV", "已模拟生成 backtest_ma_cross_BTC-USDT.csv。"));
      onClick("refreshAI", refreshAI);
      onClick("refreshNews", () => {
        addLog("info", "AI", state.selectedPair, "AI Filter", "新闻情绪刷新：articles=20, risk=medium", "NEWS-" + randId());
        toast("新闻情绪已刷新", "AI 分析缓存会随当前交易对新闻上下文更新。");
      });
      onClick("validateAI", () => toast("结构校验通过", "Payload 字段完整；非法 JSON 会返回保守高风险结果。"));
      onClick("copyAI", () => toast("复制 JSON", "已模拟复制 AI 结构化结果。"));
      onClick("runSignals", () => {
        addLog("info", "策略", state.selectedPair, state.strategy, "生成策略信号：" + state.strategies[state.strategy].signal, "SIG-" + randId());
        toast("策略信号已生成", "信号会进入 AI 过滤和风控链路。");
      });
      onClick("dryRunOrder", () => {
        addLog("info", "交易", "BTC/USDT", "manual", "Dry-run 订单校验通过", "DEC-" + randId());
        toast("模拟校验通过", "订单已走完策略、AI、风控和交易校验链路。");
      });
      onClick("liveOrder", () => confirmAction("确认实盘现货下单", "小额实盘会向交易所发送真实现货订单；请确认全局和交易所现货闸门均已开启。", () => {
        addLog("warn", "交易", "BTC/USDT", "manual", "Live 现货订单已提交", "LIVE-" + randId());
        toast("实盘订单已提交", "原型中仅模拟提交，真实系统会调用 CCXT Spot 私有接口。");
      }));
      onClick("saveRisk", () => {
        addLog("info", "风控", "ALL", "-", "风控规则已保存", "RISK-" + randId());
        toast("风控规则已保存", "阈值变更会影响允许交易、降仓或禁止开仓。");
      });
      onClick("saveSettings", () => {
        addLog("info", "数据", "ALL", "-", "系统设置已保存", "SET-" + randId());
      toast("设置已保存", "AI 模型服务商、Base URL、模型和 API Key 已写入配置草稿。");
      });

      ["cancelOrders", "cancelOrdersInline"].forEach(id => onClick(id, () => confirmAction("撤销全部挂单", "该操作会撤销当前所有未成交现货挂单。Dry-run 模式只模拟执行，Live 模式会向交易所发送现货撤单请求。", () => {
        addLog("warn", "交易", "ALL", "-", "撤销全部挂单", "ORD-" + randId());
        toast("已撤销全部挂单", "操作已写入交易日志。");
      })));

      ["closePositions", "closePositionsInline"].forEach(id => onClick(id, () => confirmAction("手动卖出现货持仓", "该操作会尝试卖出当前全部现货持仓。Live 模式存在滑点和成交失败风险，不涉及合约平仓。", () => {
        addLog("warn", "交易", "ALL", "-", "手动平仓请求已提交", "ORD-" + randId());
        toast("手动平仓已提交", "原型中仅模拟执行。");
      })));

      ["killInline"].forEach(id => onClick(id, openKillSwitch));
      onClick("pauseInTrading", togglePause);

      document.querySelectorAll("[data-action]").forEach(btn => {
        btn.onclick = () => confirmAction("确认交易操作", "该按钮代表真实系统中的订单级操作，必须二次确认并记录日志。", () => {
          addLog("warn", "交易", state.selectedPair, "-", "订单级操作已执行：" + btn.dataset.action, "ORD-" + randId());
          toast("操作已记录", btn.dataset.action);
        });
      });
    }

    function switchPage(page) {
      state.page = page;
      renderNav();
      setActivePage();
    }

    function onClick(id, handler) {
      const el = document.getElementById(id);
      if (el) el.onclick = handler;
    }

    function runBacktest() {
      const progress = document.getElementById("backtestProgress");
      const status = document.getElementById("backtestStatus");
      if (!progress || !status) return;
      progress.style.width = "8%";
      status.textContent = "运行中";
      status.className = "mini-chip warn";
      toast("回测开始", "正在模拟读取历史 K线、计算信号、扣除手续费和滑点。");
      setTimeout(() => { progress.style.width = "46%"; }, 360);
      setTimeout(() => { progress.style.width = "82%"; }, 720);
      setTimeout(() => {
        progress.style.width = "100%";
        status.textContent = "已完成";
        status.className = "mini-chip good";
        addLog("info", "策略", "BTC/USDT", "MA Cross", "回测完成：总收益 +28.4%，最大回撤 9.6%", "BT-" + randId());
        toast("回测完成", "结果已刷新，交易明细可用于复盘或 AI分析。");
      }, 1100);
    }

    function refreshAI() {
      const variants = [
        { provider: "right_code", model: "gpt-5.5", analysis_scope: "market", market_regime: "trend_up", sentiment_score: 0.76, risk_level: "medium", event_risk: "low", allowed_direction: "long_only", confidence: 0.71, gateway_status: "healthy" },
        { provider: "deepseek", model: "deepseek-v4-pro", analysis_scope: "market", market_regime: "range", sentiment_score: 0.54, risk_level: "low", event_risk: "low", allowed_direction: "both", confidence: 0.62, gateway_status: "fallback after right_code timeout" },
        { provider: "ollama", model: "qwen3.6", analysis_scope: "market", market_regime: "high_volatility", sentiment_score: 0.38, risk_level: "high", event_risk: "high", allowed_direction: "none", confidence: 0.74, gateway_status: "local model healthy" }
      ];
      const next = variants[Math.floor(Math.random() * variants.length)];
      state.ai = {
        ...next,
        decision_signal: {
          signal_id: "AIS-" + randId(),
          action: next.risk_level === "high" ? "avoid" : next.risk_level === "low" ? "buy" : "watch",
          status: "active",
          score: next.risk_level === "high" ? 42 : next.risk_level === "low" ? 81 : 66,
          horizon: next.risk_level === "high" ? "intraday" : "3d",
          entry_low: 67800,
          entry_high: 68600,
          stop_loss: 66200,
          target_price: 71800,
          plan_quality: next.risk_level === "high" ? "partial" : "complete"
        }
      };
      addLog("info", "AI", "ALL", "AI Filter", "AI分析刷新：" + state.ai.provider + "/" + state.ai.model + " risk=" + state.ai.risk_level + " allowed=" + state.ai.allowed_direction, "AI-" + randId());
      renderAll();
      switchPage("ai");
      toast("AI分析已刷新", "结构化 JSON 已更新；模型通道失败时应记录并切换备用通道。");
    }

    function togglePause() {
      state.paused = !state.paused;
      document.getElementById("pauseBtn").textContent = state.paused ? "恢复策略" : "暂停策略";
      addLog(state.paused ? "warn" : "info", "风控", "ALL", "-", state.paused ? "人工暂停策略开仓" : "人工恢复策略开仓", "RISK-" + randId());
      renderAll();
      toast(state.paused ? "策略已暂停" : "策略已恢复", state.paused ? "新开仓将被阻止，已有持仓不自动平仓。" : "系统恢复按风控规则处理信号。");
    }

    function openKillSwitch() {
      confirmAction("Kill Switch 紧急停止", "该操作会停止自动交易并撤销全部挂单。真实系统中可选是否同时平仓，必须记录完整审计日志。", () => {
        state.paused = true;
        document.getElementById("pauseBtn").textContent = "恢复策略";
        addLog("warn", "风控", "ALL", "-", "Kill Switch 触发，停止自动交易并撤销挂单", "KILL-" + randId());
        renderAll();
        toast("Kill Switch 已触发", "自动交易已暂停，挂单撤销请求已模拟提交。");
      });
    }

    function confirmAction(title, body, onConfirm) {
      const backdrop = document.getElementById("modalBackdrop");
      document.getElementById("modalTitle").textContent = title;
      document.getElementById("modalBody").textContent = body;
      backdrop.classList.add("show");
      const confirm = document.getElementById("modalConfirm");
      confirm.onclick = () => {
        backdrop.classList.remove("show");
        onConfirm();
      };
    }

    function closeModal() {
      document.getElementById("modalBackdrop").classList.remove("show");
    }

    function toast(title, body) {
      const wrap = document.getElementById("toast");
      const item = document.createElement("div");
      item.className = "toast-item";
      item.innerHTML = `<strong>${title}</strong>${body}`;
      wrap.appendChild(item);
      setTimeout(() => item.remove(), 3600);
    }

    function addLog(level, module, pair, strategy, message, id) {
      const now = new Date();
      const t = [now.getHours(), now.getMinutes(), now.getSeconds()].map(n => String(n).padStart(2, "0")).join(":");
      state.logs.unshift([t, level, module, pair, strategy, message, id]);
      state.logs = state.logs.slice(0, 16);
    }

    function randId() {
      return Math.floor(100 + Math.random() * 900);
    }

    document.getElementById("nav").addEventListener("click", event => {
      const btn = event.target.closest("[data-nav]");
      if (btn) switchPage(btn.dataset.nav);
    });

    document.getElementById("modeSegment").addEventListener("click", event => {
      const btn = event.target.closest("[data-mode]");
      if (!btn) return;
      const next = btn.dataset.mode;
      if (next === state.mode) return;
      if (next === "live") {
        confirmAction("切换到 Spot Live 真实交易", "Live 模式会允许系统向交易所发送真实现货订单。请确认只启用现货交易权限，合约、杠杆、提现权限均已关闭，IP 白名单、风控阈值和资金规模都已检查。", () => {
          state.mode = "live";
          addLog("warn", "交易", "ALL", "-", "交易模式切换为 Live", "MODE-" + randId());
          updateModeSegment();
          renderAll();
          toast("已切换到 Spot Live", "真实交易模式仅限现货，必须保持风控和日志开启。");
        });
      } else {
        state.mode = "dry";
        addLog("info", "交易", "ALL", "-", "交易模式切换为 Dry-run", "MODE-" + randId());
        updateModeSegment();
        renderAll();
        toast("已切换到 Dry-run", "当前只模拟交易，不发送真实订单。");
      }
    });

    function updateModeSegment() {
      const segment = document.getElementById("modeSegment");
      segment.classList.toggle("live", state.mode === "live");
      segment.querySelectorAll("button").forEach(btn => btn.classList.toggle("active", btn.dataset.mode === state.mode));
    }

    document.getElementById("pauseBtn").onclick = togglePause;
    document.getElementById("killBtn").onclick = openKillSwitch;
    document.getElementById("modalClose").onclick = closeModal;
    document.getElementById("modalCancel").onclick = closeModal;
    document.getElementById("modalBackdrop").addEventListener("click", event => {
      if (event.target.id === "modalBackdrop") closeModal();
    });

    renderAll();
    updateModeSegment();
  </script>
</body>
</html>
